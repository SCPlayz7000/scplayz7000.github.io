<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 400-Million Pixel S-Curve Grid</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: white;
        }
        #info, #editor-panel {
            position: absolute;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        #info {
            top: 10px;
            left: 10px;
            pointer-events: none;
        }
        #editor-panel {
            top: 10px;
            right: 10px;
            display: none;
            width: 240px;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        button {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
        }
        button:hover { background: #00ccaa; }
        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">
        <h2>The S-Curve Grid</h2>
        <p>Drag to Pan | Scroll to Zoom</p>
        <hr style="border-color:#333">
        <p>Hover X: <span id="hoverX">0</span> | Y: <span id="hoverY">0</span></p>
        <p>Current Pixel Price: $<span id="curPrice">0.01</span></p>
        <p>Total Sold: <span id="totalSold">0</span> / 400M</p>
    </div>

    <div id="editor-panel">
        <h3>Design Your Space</h3>
        <p id="selectionDetails">Loc: (0,0)</p>
        
        <canvas id="pixelEditorCanvas" width="160" height="160" style="border:1px solid #555; display:block; margin:10px auto; background:#222;"></canvas>
        
        <div style="text-align:center; margin-bottom:10px;">
            <label>Paint Color: </label>
            <input type="color" id="paintColor" value="#00ffcc">
        </div>

        <p>Estimated Cost: <strong>$<span id="blockCost">0.00</span></strong></p>
        
        <button onclick="generatePayload()">1. Generate Design Code</button>
        
        <textarea id="payloadBox" readonly placeholder="Your art code will appear here..." style="width:90%; height:50px; background:#222; color:#fff; border:1px solid #333; font-family:monospace; font-size:10px; margin-top:5px; display:none; resize:none;"></textarea>
        
        <button id="buyBtn" style="display:none;" onclick="processPayment()">2. Purchase Space</button>
        <button style="background:#ff0055; color:white; margin-top:5px;" onclick="cancelSelection()">Cancel</button>
    </div>

    <footer>
        Built with AI assistance. Tested and operated by and for humans. Released under the Unlicense.
    </footer>

    <canvas id="gridCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        
        // Updated to your new 20k boundaries
        const GRID_WIDTH = 20000;
        const GRID_HEIGHT = 20000;

        let cameraX = GRID_WIDTH / 2;
        let cameraY = GRID_HEIGHT / 2;
        let zoom = 1; 
        let isDragging = false;
        let startX, startY;

        // TRACKING SIMULATED SALES FOR S-CURVE
        let totalPixelsSold = 25000000; 

        // S-CURVE LOGISTIC MATH CONFIGURATION
        const MAX_PRICE = 10.00;     
        const STEEPNESS = 0.0000001; 
        const MIDPOINT = 50000000;   

        function getPixelPrice(N) {
            const price = MAX_PRICE / (1 + Math.exp(-STEEPNESS * (N - MIDPOINT)));
            return Math.max(0.01, price); 
        }

        // Existing data structures
        const soldBlocks = [
            { x: 9950, y: 9950, w: 100, h: 100, color: '#ff0055' },
            { x: 10100, y: 9900, w: 120, h: 60, color: '#00ffcc' }
        ];

        let selection = null;

        // PIXEL EDITOR LAYOUT CONSTANTS
        const editorCanvas = document.getElementById('pixelEditorCanvas');
        const eCtx = editorCanvas.getContext('2d');
        const EDITOR_SIZE = 16; // Fixes block scale to 16x16 pixel layout areas
        const PIXEL_SCALE = 10; 
        let editorGrid = Array(EDITOR_SIZE).fill().map(() => Array(EDITOR_SIZE).fill('#00ffcc'));

        function drawEditor() {
            eCtx.clearRect(0, 0, editorCanvas.width, editorCanvas.height);
            for (let y = 0; y < EDITOR_SIZE; y++) {
                for (let x = 0; x < EDITOR_SIZE; x++) {
                    eCtx.fillStyle = editorGrid[y][x];
                    eCtx.fillRect(x * PIXEL_SCALE, y * PIXEL_SCALE, PIXEL_SCALE - 1, PIXEL_SCALE - 1);
                }
            }
        }

        editorCanvas.addEventListener('mousedown', (e) => {
            const rect = editorCanvas.getBoundingClientRect();
            const clickX = Math.floor((e.clientX - rect.left) / PIXEL_SCALE);
            const clickY = Math.floor((e.clientY - rect.top) / PIXEL_SCALE);
            const activeColor = document.getElementById('paintColor').value;
            
            if (clickX >= 0 && clickX < EDITOR_SIZE && clickY >= 0 && clickY < EDITOR_SIZE) {
                editorGrid[clickY][clickX] = activeColor;
                drawEditor();
            }
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const currentUnitPrice = getPixelPrice(totalPixelsSold);
            document.getElementById('curPrice').innerText = currentUnitPrice.toFixed(4);
            document.getElementById('totalSold').innerText = totalPixelsSold.toLocaleString();

            // Draw boundaries
            ctx.strokeStyle = '#333';
            ctx.lineWidth = Math.max(1, 2 * zoom);
            const rectX = centerX + (0 - cameraX) * zoom;
            const rectY = centerY + (0 - cameraY) * zoom;
            ctx.strokeRect(rectX, rectY, GRID_WIDTH * zoom, GRID_HEIGHT * zoom);

            // Render sold blocks
            soldBlocks.forEach(block => {
                const screenX = centerX + (block.x - cameraX) * zoom;
                const screenY = centerY + (block.y - cameraY) * zoom;
                ctx.fillStyle = block.color;
                ctx.fillRect(screenX, screenY, block.w * zoom, block.h * zoom);
            });

            // Render selection box
            if (selection) {
                const screenX = centerX + (selection.x - cameraX) * zoom;
                const screenY = centerY + (selection.y - cameraY) * zoom;
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX, screenY, selection.w * zoom, selection.h * zoom);
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const gridX = Math.floor(cameraX + (e.clientX - centerX) / zoom);
            const gridY = Math.floor(cameraY + (e.clientY - centerY) / zoom);

            if(gridX >= 0 && gridX <= GRID_WIDTH && gridY >= 0 && gridY <= GRID_HEIGHT) {
                document.getElementById('hoverX').innerText = gridX;
                document.getElementById('hoverY').innerText = gridY;
            }

            if (isDragging) {
                cameraX -= (e.clientX - startX) / zoom;
                cameraY -= (e.clientY - startY) / zoom;
                cameraX = Math.max(0, Math.min(GRID_WIDTH, cameraX));
                cameraY = Math.max(0, Math.min(GRID_HEIGHT, cameraY));
                startX = e.clientX;
                startY = e.clientY;
                draw();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // Click grid to lock selection area and show drawing matrix tools
        canvas.addEventListener('click', (e) => {
            if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) return; 
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const clickGridX = Math.floor(cameraX + (e.clientX - centerX) / zoom);
            const clickGridY = Math.floor(cameraY + (e.clientY - centerY) / zoom);

            selection = { x: clickGridX - 8, y: clickGridY - 8, w: 16, h: 16 };
            editorGrid = Array(EDITOR_SIZE).fill().map(() => Array(EDITOR_SIZE).fill('#00ffcc'));
            
            const totalPixels = selection.w * selection.h;
            const estimatedCost = totalPixels * getPixelPrice(totalPixelsSold);

            document.getElementById('selectionDetails').innerText = `Loc: (${selection.x}, ${selection.y}) | 16x16 Block`;
            document.getElementById('blockCost').innerText = estimatedCost.toFixed(2);
            document.getElementById('editor-panel').style.display = 'block';
            
            document.getElementById('payloadBox').style.display = 'none';
            document.getElementById('buyBtn').style.display = 'none';
            
            drawEditor();
            draw();
        });

        function generatePayload() {
            const payload = {
                x: selection.x,
                y: selection.y,
                w: selection.w,
                h: selection.h,
                grid: editorGrid
            };
            
            const encodedString = btoa(JSON.stringify(payload));
            const pBox = document.getElementById('payloadBox');
            pBox.value = encodedString;
            pBox.style.display = 'block';
            pBox.select(); 
            
            document.getElementById('buyBtn').style.display = 'block';
            alert("Artwork design code generated! Copy the text in the box below before clicking buy.");
        }

        function cancelSelection() {
            selection = null;
            document.getElementById('editor-panel').style.display = 'none';
            draw();
        }

        function processPayment() {
            alert("To buy space: Head to my Ko-fi/Stripe link and include your coordinate data tag payload in the reference details note field!");
        }

        // Premium Mouse-Centered Map Zooming Logic
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const gridMouseX = cameraX + (mouseX - centerX) / zoom;
            const gridMouseY = cameraY + (mouseY - centerY) / zoom;

            if (e.deltaY < 0) {
                zoom = Math.min(20, zoom * 1.1); 
            } else {
                zoom = Math.max(0.05, zoom / 1.1); 
            }

            cameraX = gridMouseX - (mouseX - centerX) / zoom;
            cameraY = gridMouseY - (mouseY - centerY) / zoom;
            cameraX = Math.max(0, Math.min(GRID_WIDTH, cameraX));
            cameraY = Math.max(0, Math.min(GRID_HEIGHT, cameraY));

            draw();
        }, { passive: false });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
