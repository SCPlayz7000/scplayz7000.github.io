<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Block Grid Board</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        .bmc-link {
            background-color: #FFDD00;
            color: #000000;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .bmc-link:hover {
            background-color: #ffea6c;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 800px;
            width: 100%;
            flex-wrap: wrap;
        }

        .canvas-container {
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        canvas {
            border: 1px solid #444;
            display: block;
            cursor: pointer;
        }

        .controls {
            flex: 1;
            min-width: 250px;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            background: none;
            cursor: pointer;
        }

        .btn-purchase {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-purchase:hover {
            background-color: #0098ff;
        }

        .status {
            font-size: 14px;
            color: #888;
            background-color: #151515;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #007acc;
        }
    </style>
</head>
<body>

    <header>
        <h1>Block Purchase Grid</h1>
        <a href="https://buymeacoffee.com/scplayz7000" target="_blank" class="bmc-link">Buy Me a Coffee</a>
    </header>

    <div class="container">
        <div class="canvas-container">
            <canvas id="gridCanvas" width="512" height="512"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="colorPicker">Select Color</label>
                <input type="color" id="colorPicker" value="#ff0000">
            </div>

            <div class="control-group">
                <label>Current Selection</label>
                <div id="selectionStatus" class="status">Click the grid to select a block</div>
            </div>

            <button id="purchaseBtn" class="btn-purchase">Purchase Block</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const selectionStatus = document.getElementById('selectionStatus');
        const purchaseBtn = document.getElementById('purchaseBtn');

        // Configurable block size (e.g., 16x16 pixels)
        const BLOCK_SIZE = 16; 
        const COLS = canvas.width / BLOCK_SIZE;
        const ROWS = canvas.height / BLOCK_SIZE;

        // In-memory registry of purchased blocks
        // Keys will be structured as "col_row"
        const purchasedBlocks = {};

        let selectedBlock = null;

        // Initialize grid rendering
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw purchased blocks
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const key = `${c}_${r}`;
                    if (purchasedBlocks[key]) {
                        ctx.fillStyle = purchasedBlocks[key];
                        ctx.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    } else {
                        // Subtle grid lines for empty spaces
                        ctx.strokeStyle = '#2a2a2a';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }

            // Highlight current selection
            if (selectedBlock) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(selectedBlock.col * BLOCK_SIZE, selectedBlock.row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            }
        }

        // Handle clicks on the canvas
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Snap individual pixel coordinates immediately into block grid positions
            const col = Math.floor(mouseX / BLOCK_SIZE);
            const row = Math.floor(mouseY / BLOCK_SIZE);

            // Prevent out-of-bounds selection
            if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
                selectedBlock = { col, row };
                
                const key = `${col}_${row}`;
                const statusText = `Block: [Column ${col}, Row ${row}]<br>Status: ${purchasedBlocks[key] ? 'Owned' : 'Available'}`;
                selectionStatus.innerHTML = statusText;
                
                drawGrid();
            }
        });

        // Handle block purchase commit
        purchaseBtn.addEventListener('click', () => {
            if (!selectedBlock) {
                alert('Please select a block on the grid first.');
                return;
            }

            const key = `${selectedBlock.col}_${selectedBlock.row}`;
            const chosenColor = colorPicker.value;

            // Commit block updates locally
            purchasedBlocks[key] = chosenColor;
            
            selectionStatus.innerHTML = `Block: [Column ${selectedBlock.col}, Row ${selectedBlock.row}]<br>Status: Owned`;
            
            drawGrid();
            
            // Optional hook point for database integrations
            console.log(`Saved block ${key} with color ${chosenColor}`);
        });

        // Initial paint execution
        drawGrid();
    </script>
</body>
</html>
